```html
<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<title>
🌿生薬学習アプリ
</title>

<link rel="stylesheet" href="style.css">

</head>

<body>


<!-- ホーム画面 -->
<div id="homeScreen">

<div class="container">

<h1>
🌿 生薬学習アプリ
</h1>

<h2>
問題形式を選択
</h2>


<label>

<input
type="radio"
name="quizMode"
value="image"
checked>

画像 → 生薬

</label>

<br><br>


<label>

<input
type="radio"
name="quizMode"
value="ingredient">

成分 → 生薬

</label>

<br><br>


<label>

<input
type="radio"
name="quizMode"
value="latin">

ラテン名 → 生薬

</label>

<br><br>


<label>

<input
type="radio"
name="quizMode"
value="reverseIngredient">

生薬 → 成分

</label>

<br><br>


<label>

<input
type="radio"
name="quizMode"
value="reverseLatin">

生薬 → ラテン名

</label>

<br><br>


<label>

<input
type="radio"
name="quizMode"
value="reverseEffect">

生薬 → 効能

</label>

<br><br>


<button onclick="startQuiz()">

クイズ開始

</button>

</div>

</div>



<!-- 問題画面 -->
<div
id="quizScreen"
style="display:none;"
>

<div class="container">

<div class="searchArea">

<input
id="searchBox"
type="text"
placeholder="生薬名・成分・ラテン名で検索"
onkeyup="autoComplete()">

<div id="suggestions"></div>

</div>


<div id="searchResult"></div>


<button onclick="toggleReview()">
📚 苦手問題復習
</button>

<button onclick="resetWrong()">
🗑 苦手リセット
</button>

<button onclick="startWeakMode()">
📚 苦手だけ出題
</button>

<hr>


<h2 id="question"></h2>


<img id="questionImage">

<img id="compoundImage">


<div id="choices"></div>


<div id="result"></div>

<div id="detail"></div>

<button onclick="toggleWrongList()">

📚 間違えた問題一覧

</button>

<div
id="wrongList"
style="display:none;"
>

</div>


<br>


<button onclick="loadQuestion()">

次の問題

</button>

<button onclick="location.reload()">

ホームへ戻る

</button>

</div>

</div>


<script src="script.js"></script>

</body>

</html>
```
