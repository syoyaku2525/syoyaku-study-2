<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<title>🌿生薬学習アプリ</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>🌿 生薬学習アプリ</h1>

<div>

<button onclick="setMode('image')">
画像→生薬
</button>

<button onclick="setMode('ingredient')">
成分→生薬
</button>

<button onclick="setMode('latin')">
ラテン→生薬
</button>

<button onclick="setMode('reverseIngredient')">
生薬→成分
</button>

<button onclick="setMode('reverseLatin')">
生薬→ラテン
</button>

<button onclick="setMode('reverseEffect')">
生薬→効能
</button>

</div>

<hr>

<div class="searchArea">

<input
id="searchBox"
type="text"
placeholder="生薬名・成分・ラテン名で検索"
onkeyup="autoComplete()">

<div id="suggestions"></div>

</div>

<div id="searchResult"></div>

<button onclick="toggleReview()">
📚苦手問題復習
</button>

<button onclick="resetWrong()">
🗑苦手リセット
</button>

<div id="question"></div>

<img id="herbImage">

<img id="compoundImage">

<div id="choices"></div>

<div id="result"></div>

<div id="detail"></div>

<button onclick="loadQuestion()">
次の問題
</button>

</div>

<script src="script.js"></script>

</body>
</html>
