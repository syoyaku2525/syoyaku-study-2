<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<title>🌿生薬学習アプリ</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ホーム画面 -->
<div id="homeScreen">

<div class="container">

<h1>🌿 生薬学習アプリ</h1>

<h2>問題形式を選択</h2>

<div>

<button onclick="setMode('image')">
画像→生薬
</button>

<button onclick="setMode('ingredient')">
成分→生薬
</button>

<button onclick="setMode('latin')">
ラテン→生薬
</button>

<button onclick="setMode('reverseIngredient')">
生薬→成分
</button>

<button onclick="setMode('reverseLatin')">
生薬→ラテン
</button>

<button onclick="setMode('reverseEffect')">
生薬→効能
</button>

</div>

<label>
<input type="checkbox" value="name" checked>
生薬名
</label>

<label>
<input type="checkbox" value="ingredient" checked>
成分
</label>

<label>
<input type="checkbox" value="latin" checked>
ラテン名
</label>

<br><br>

<button onclick="startQuiz()">
クイズ開始
</button>

</div>

</div>


<!-- 問題画面 -->
<div id="quizScreen" style="display:none;">



<hr>

<div class="searchArea">

<input
id="searchBox"
type="text"
placeholder="生薬名・成分・ラテン名で検索"
onkeyup="autoComplete()">

<div id="suggestions"></div>

</div>

<div id="searchResult"></div>

<button onclick="toggleReview()">
📚苦手問題復習
</button>

<button onclick="resetWrong()">
🗑苦手リセット
</button>

<h2 id="question"></h2>

<img id="questionImage">

<img id="compoundImage">

<div id="choices"></div>

<button onclick="startWeakMode()">
📚 苦手だけ出題
</button>

<div id="result"></div>

<div id="detail"></div>

<button onclick="loadQuestion()">
次の問題
</button>

</div>

<script src="script.js"></script>

</body>
